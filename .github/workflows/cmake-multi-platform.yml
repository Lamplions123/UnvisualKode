name: CMake Multi-Platform Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.5.3

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            triplet: x64-linux
            qt_arch: gcc_64
            artifact_name: UnvisualKode-Linux
          - os: windows-latest
            triplet: x64-windows
            qt_arch: win64_msvc2019_64
            artifact_name: UnvisualKode-Windows
          - os: macos-latest
            triplet: x64-osx
            qt_arch: clang_64
            artifact_name: UnvisualKode-macOS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ matrix.qt_arch }}
        cache: true
        cache-key-prefix: qt-${{ matrix.os }}-${{ env.QT_VERSION }}

    - name: Setup Ninja (Linux/macOS)
      if: runner.os != 'Windows'
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: |
        cmake -B build -G "${{ runner.os == 'Windows' && 'Visual Studio 17 2022' || 'Ninja' }}" \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Install
      run: |
        cmake --install build --prefix install --config ${{ env.BUILD_TYPE }}

    - name: Package (Linux)
      if: runner.os == 'Linux'
      run: |
        cd install
        tar -czvf ../UnvisualKode-Linux.tar.gz .

    - name: Package (macOS)
      if: runner.os == 'macOS'
      run: |
        cd install
        zip -r ../UnvisualKode-macOS.zip .

    - name: Package (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path install/* -DestinationPath UnvisualKode-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          UnvisualKode-Linux.tar.gz
          UnvisualKode-macOS.zip
          UnvisualKode-Windows.zip
        if-no-files-found: warn

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.os }}
        path: |
          build/CMakeFiles/CMakeOutput.log
          build/CMakeFiles/CMakeError.log

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/UnvisualKode-Linux/UnvisualKode-Linux.tar.gz
          artifacts/UnvisualKode-macOS/UnvisualKode-macOS.zip
          artifacts/UnvisualKode-Windows/UnvisualKode-Windows.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}